services:

  valeria:
    build:
      context: .
      target: valeria
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////app/data/valeria.db}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ATTR02_ANALYZER: ${ATTR02_ANALYZER:-stub}
      ATTR03_ANALYZER: ${ATTR03_ANALYZER:-stub}
      ATTR04_ANALYZER: ${ATTR04_ANALYZER:-stub}
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage

  leila:
    build:
      context: .
      target: leila
    restart: unless-stopped
    depends_on:
      - valeria

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - valeria
      - leila
