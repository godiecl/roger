services:

  valeria-migrate:
    build:
      context: .
      target: valeria-migrate
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////app/data/valeria.db}
    volumes:
      - ./data:/app/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  valeria:
    build:
      context: .
      target: valeria-runtime
    restart: unless-stopped
    depends_on:
      valeria-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////app/data/valeria.db}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ATTR02_ANALYZER: ${ATTR02_ANALYZER:-stub}
      ATTR03_ANALYZER: ${ATTR03_ANALYZER:-stub}
      ATTR04_ANALYZER: ${ATTR04_ANALYZER:-stub}
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  leila:
    build:
      context: .
      target: leila
    restart: unless-stopped
    depends_on:
      valeria:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage:/app/storage:ro
      - ${TLS_CERT_DIR:-/etc/roger/certs}:/etc/nginx/certs:ro
    depends_on:
      valeria:
        condition: service_healthy
      leila:
        condition: service_healthy

volumes:
  redis_data:
