# =============================================================================
# ROGER — nginx config
#
# ANTES DEL PRIMER DEPLOY:
#   1. Copiar el certificado TLS emitido por la UCN:
#        /etc/roger/certs/roger.crt
#        /etc/roger/certs/roger.key
#   2. Reemplazar "roger.ucn.cl" con el dominio real asignado por TI UCN.
#   3. docker compose up -d nginx
# =============================================================================

limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/s;


# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}


# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name roger.ucn.cl;  # reemplazar con dominio real

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/roger.crt;
    ssl_certificate_key /etc/nginx/certs/roger.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                               always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.groq.com; frame-ancestors 'none';"
        always;

    # ── Auth — rate limit estricto (10 req/min por IP) ───────────────────────
    location /api/v1/auth {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://valeria:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API general ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://valeria:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://valeria:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Archivos estáticos servidos directamente por nginx ───────────────────
    location /storage/ {
        alias /app/storage/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ── Frontend ─────────────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass         http://leila:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
