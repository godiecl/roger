---
#  docker run -it --name valeria --rm -p 8000:8000 -v ./.env.release:/app/.env roger/valeria:prod
name: valeria

services:
  valeria:
    build:
      context: .
      dockerfile: Dockerfile
    image: roger/valeria:prod
    container_name: valeria
    hostname: valeria
    expose:
      - 8000
    volumes:
      - ./.env.release:/app/.env:ro
    restart: unless-stopped

networks:
  default:
    name: npm
    external: true
